# ============================================================================
# FinSentiment — configuration
# Central place for paths, market/universe settings, feature lists, model
# hyper-parameters, and the trigger threshold. Override at runtime by passing
# --config to the scripts, or edit in place.
# ============================================================================

paths:
  raw_news:        data/raw/stock_data_articles.csv
  raw_prices:      data/raw/price_df.csv            # engineered price table (OHLCV + technicals + triggers)
  merged:          data/interim/merged_final.csv    # article x price master table (pre-sentiment)
  sentiment_dir:   data/processed/sentiment         # <model>_sentiments.csv  (label, confidence)
  embeddings_dir:  data/processed/embeddings        # <model>_embeddings.csv  (stringified vectors)
  results_dir:     results

# Use the committed sample slices instead of the full local datasets.
# Handy for a quick end-to-end smoke test on a clone.
use_sample: false
sample_paths:
  merged:          data/sample/merged_final.sample.csv
  raw_prices:      data/sample/price_df.sample.csv
  sentiment_dir:   data/sample/sentiment            # *_sentiments.sample.csv

market:
  ticker:     "^GSPC"          # S&P 500 index
  start_date: "2014-01-01"
  end_date:   "2024-04-20"
  interval:   "1d"

triggers:
  threshold: 0.005             # +/-0.5% dead-band for the ternary label
  horizons:  [1, 3, 5]         # trading days -> trigger_1d / trigger_3d / trigger_5d

features:
  # Technical + sentiment columns used by the LLM pipelines (non-embedding).
  numeric:
    - Close
    - High
    - Low
    - Open
    - Volume
    - SMA_5
    - EMA_10
    - volatility_5d
    - RSI_14
    - title_length
    - text_length
    - sentiment_num
    - sentiment_confidence
  # Columns never fed to the model (leakage / identifiers).
  blocklist:
    - Publishdate
    - aligned_date
    - short_text
    - return_1d
    - return_3d
    - return_5d
  lags: 5                      # add_lagged_features: t-1 .. t-5

sentiment:
  # Maps the catalog name -> provider + remote model id. API keys come from
  # environment variables, never from this file.
  text_max_words: 500         # LLM input cap (first N whitespace tokens of title+text)
  models:
    finbert:       { provider: finbert, model: "yiyanghkust/finbert-tone" }
    gpt4o_mini:    { provider: openai,   model: "gpt-4o-mini" }
    gpt41_mini:    { provider: openai,   model: "gpt-4.1-mini" }
    gpt5:          { provider: openai,   model: "gpt-5" }
    deepseek:      { provider: deepseek, model: "deepseek-chat" }
  embedding_model: "text-embedding-3-small"   # OpenAI embeddings (1536-d)

split:
  # strategy: random | time | grouped
  strategy: time
  test_size: 0.2
  random_state: 42
  embargo_days: 1             # only used by the grouped strategy

models:
  random_forest:
    n_estimators: 200
    random_state: 42
  xgboost:
    n_estimators: 400
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
  lightgbm:
    n_estimators: 1000
    learning_rate: 0.01
    max_depth: -1
    class_weight: balanced
    random_state: 42
